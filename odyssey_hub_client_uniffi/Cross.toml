# protoc comes from the pinned release binary, not the distro package: cross
# base images can carry a proto2-only protoc, and the distro package would be
# target-arch while protoc must run on the build host. Keep the version in
# sync with the setup-protoc pin in .github/workflows/bindgen-build.yml.

[target.x86_64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y pkg-config curl unzip libudev-dev:$CROSS_DEB_ARCH libdbus-1-dev:$CROSS_DEB_ARCH",
    "curl -sSfL https://github.com/protocolbuffers/protobuf/releases/download/v26.1/protoc-26.1-linux-x86_64.zip -o /tmp/protoc.zip && unzip -o /tmp/protoc.zip -d /usr/local 'bin/protoc' 'include/*' && chmod +x /usr/local/bin/protoc"
]

[target.aarch64-unknown-linux-gnu]
pre-build = [
    "dpkg --add-architecture $CROSS_DEB_ARCH",
    "apt-get update && apt-get install -y pkg-config curl unzip libudev-dev:$CROSS_DEB_ARCH libdbus-1-dev:$CROSS_DEB_ARCH",
    "curl -sSfL https://github.com/protocolbuffers/protobuf/releases/download/v26.1/protoc-26.1-linux-x86_64.zip -o /tmp/protoc.zip && unzip -o /tmp/protoc.zip -d /usr/local 'bin/protoc' 'include/*' && chmod +x /usr/local/bin/protoc"
]
