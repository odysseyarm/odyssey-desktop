name: Bindgen Release

# Publish bindgen packages for all languages when an
# odyssey-hub-client-uniffi-vX.Y.Z tag is pushed. The tag version must match
# odyssey_hub_client_uniffi/Cargo.toml. App release tags (v*) do not trigger
# this workflow.
#
# To add a new language, add a publish-<language> job below (and its build
# job in bindgen-build.yml).

on:
  push:
    tags:
      - 'odyssey-hub-client-uniffi-v*.*.*'

permissions:
  contents: read

jobs:
  check-version:
    name: Check tag matches crate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v5
      - name: Verify tag version
        id: check
        run: |
          tag_version="${GITHUB_REF_NAME#odyssey-hub-client-uniffi-v}"
          crate_version=$(grep -m1 '^version' odyssey_hub_client_uniffi/Cargo.toml | cut -d'"' -f2)
          if [ "$tag_version" != "$crate_version" ]; then
            echo "Tag version ($tag_version) does not match odyssey_hub_client_uniffi/Cargo.toml version ($crate_version)" >&2
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

  build:
    needs: check-version
    uses: ./.github/workflows/bindgen-build.yml
    with:
      version: ${{ needs.check-version.outputs.version }}

  publish-python:
    name: Publish Python to PyPI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: python-*
      - uses: astral-sh/setup-uv@v6
      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        # --check-url replaces maturin's --skip-existing: files already on the
        # index are skipped instead of failing the upload
        run: uv publish --check-url https://pypi.org/simple/ python-*/*

  publish-dotnet:
    name: Publish C# to NuGet
    runs-on: ubuntu-latest
    needs: build
    permissions:
      # OIDC token for nuget.org trusted publishing (policy
      # "odysseyhubclient-publish" is bound to this repo + workflow file)
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dotnet-nuget
      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: cilan
      - name: Push to NuGet
        run: dotnet nuget push "*.nupkg" --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
