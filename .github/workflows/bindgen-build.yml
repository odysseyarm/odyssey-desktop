name: Bindgen Build

# Reusable workflow that builds (and smoke-tests) all bindgen language
# packages. Called by bindgen-ci.yml (PRs / pushes) and bindgen-release.yml
# (tags). To add a new language, add its build job(s) here and a matching
# publish job in bindgen-release.yml.
#
# All artifacts follow the naming scheme: <language>-<platform>-<target>

on:
  workflow_call:
    inputs:
      version:
        description: Package version override (e.g. from the release tag); empty = project defaults
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  # Wheel builds use the project-local uniffi-bindgen: maturin detects the
  # workspace bin and runs `cargo run --bin uniffi-bindgen`, so bindings always
  # match the uniffi version in Cargo.lock. The pip pin in pyproject.toml only
  # covers builds where that bin isn't available — guard that it hasn't
  # drifted from the lockfile.
  check-pyproject-pin:
    name: Check pyproject uniffi-bindgen pin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify pin matches Cargo.lock
        run: |
          version=$(grep -A1 '^name = "uniffi"$' odyssey_hub_client_uniffi/Cargo.lock | grep '^version' | cut -d'"' -f2)
          if [ -z "$version" ]; then
            echo "Could not find uniffi version in Cargo.lock" >&2
            exit 1
          fi
          pin="${version%.*}.*"
          if ! grep -qF "uniffi-bindgen==$pin" odyssey_hub_client_uniffi/pyproject.toml; then
            echo "pyproject.toml build-system pin does not match Cargo.lock uniffi $version — update it to uniffi-bindgen==$pin" >&2
            exit 1
          fi

  python-linux:
    name: Python linux ${{ matrix.platform.manylinux }} ${{ matrix.platform.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform:
          - target: x86_64
            manylinux: auto
          - target: x86
            manylinux: auto
          - target: aarch64
            manylinux: auto
          - target: armv7
            manylinux: auto
          - target: s390x
            manylinux: auto
          - target: ppc64le
            manylinux: auto
          - target: x86_64
            manylinux: musllinux_1_2
          - target: x86
            manylinux: musllinux_1_2
          - target: aarch64
            manylinux: musllinux_1_2
          - target: armv7
            manylinux: musllinux_1_2
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install Protoc
        id: protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist --find-interpreter --manifest-path odyssey_hub_client_uniffi/Cargo.toml
          sccache: 'true'
          manylinux: ${{ matrix.platform.manylinux }}
          docker-options: --mount type=bind,source=${{ steps.protoc.outputs.path }}/bin/protoc,destination=/protoc/protoc -e PROTOC=/protoc/protoc
      - name: Test wheel
        if: matrix.platform.target == 'x86_64' && matrix.platform.manylinux == 'auto'
        run: |
          pip install dist/*.whl
          python -c "import ohc_uniffi"
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: python-linux-${{ matrix.platform.manylinux }}-${{ matrix.platform.target }}
          path: dist

  python-windows:
    name: Python windows ${{ matrix.target }} (cross via xwin)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --manifest-path odyssey_hub_client_uniffi/Cargo.toml
          sccache: 'true'
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: python-windows-${{ matrix.target }}
          path: dist

  python-macos:
    name: Python macos ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist --find-interpreter --manifest-path odyssey_hub_client_uniffi/Cargo.toml
          sccache: 'true'
      - name: Test wheel
        if: matrix.target == 'aarch64'
        run: |
          pip install dist/*.whl
          python -c "import ohc_uniffi"
      - name: Upload wheels
        uses: actions/upload-artifact@v6
        with:
          name: python-macos-${{ matrix.target }}
          path: dist

  # C# NuGet ships one package with all native libs (runtimes/<rid>/native).
  # Natives: linux via cross (Cross.toml drives the containers, same as the
  # local Justfile), windows via cargo-xwin, macos on the macos runner.
  dotnet-natives-linux:
    name: DotNet natives linux + windows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: taiki-e/install-action@v2
        with:
          tool: cross
      - name: Install cargo-xwin
        run: pip install cargo-xwin
      - name: Add windows target
        run: rustup target add x86_64-pc-windows-msvc
      - name: Build linux natives (cross)
        working-directory: odyssey_hub_client_uniffi
        run: |
          cross build --release -p odyssey_hub_client_uniffi --target x86_64-unknown-linux-gnu
          cross build --release -p odyssey_hub_client_uniffi --target aarch64-unknown-linux-gnu
      - name: Build windows native (xwin)
        working-directory: odyssey_hub_client_uniffi
        run: cargo xwin build --release -p odyssey_hub_client_uniffi --target x86_64-pc-windows-msvc
      - uses: actions/upload-artifact@v6
        with:
          name: dotnet-native-x86_64-unknown-linux-gnu
          path: odyssey_hub_client_uniffi/target/x86_64-unknown-linux-gnu/release/libohc_uniffi.so
      - uses: actions/upload-artifact@v6
        with:
          name: dotnet-native-aarch64-unknown-linux-gnu
          path: odyssey_hub_client_uniffi/target/aarch64-unknown-linux-gnu/release/libohc_uniffi.so
      - uses: actions/upload-artifact@v6
        with:
          name: dotnet-native-x86_64-pc-windows-msvc
          path: odyssey_hub_client_uniffi/target/x86_64-pc-windows-msvc/release/ohc_uniffi.dll

  dotnet-natives-macos:
    name: DotNet natives macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add x86_64 target
        run: rustup target add x86_64-apple-darwin
      - name: Build macos natives
        working-directory: odyssey_hub_client_uniffi
        run: |
          cargo build --release -p odyssey_hub_client_uniffi --target aarch64-apple-darwin
          cargo build --release -p odyssey_hub_client_uniffi --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v6
        with:
          name: dotnet-native-aarch64-apple-darwin
          path: odyssey_hub_client_uniffi/target/aarch64-apple-darwin/release/libohc_uniffi.dylib
      - uses: actions/upload-artifact@v6
        with:
          name: dotnet-native-x86_64-apple-darwin
          path: odyssey_hub_client_uniffi/target/x86_64-apple-darwin/release/libohc_uniffi.dylib

  dotnet-package:
    name: DotNet pack NuGet
    runs-on: ubuntu-latest
    needs: [dotnet-natives-linux, dotnet-natives-macos]
    steps:
      - uses: actions/checkout@v5
      - name: Install Protoc
        uses: arduino/setup-protoc@v3
        with:
          version: "26.x"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download natives
        uses: actions/download-artifact@v6
        with:
          pattern: dotnet-native-*
      - name: Place natives in target dirs
        run: |
          for triple in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu x86_64-pc-windows-msvc aarch64-apple-darwin x86_64-apple-darwin; do
            mkdir -p "odyssey_hub_client_uniffi/target/$triple/release"
            mv dotnet-native-"$triple"/* "odyssey_hub_client_uniffi/target/$triple/release/"
          done
      # Keep the tag in sync with install_tools in the dotnet Justfile
      - name: Install uniffi-bindgen-cs
        run: cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.11.0+v0.31.0
      - name: Generate C# bindings
        working-directory: odyssey_hub_client_uniffi/dotnet/OdysseyHubClient
        run: cargo run --manifest-path ../../Cargo.toml --release --bin cs_bindgen -- ../../target/x86_64-unknown-linux-gnu/release/libohc_uniffi.so OdysseyHubClient/generated
      # Explicit Release build first: GeneratePackageOnBuild makes `dotnet pack`
      # skip its implicit build, and pack looks in bin/Release.
      - name: Pack
        working-directory: odyssey_hub_client_uniffi/dotnet/OdysseyHubClient
        run: |
          version_props=()
          if [ -n "${{ inputs.version }}" ]; then
            version_props=(-p:Version="${{ inputs.version }}")
          fi
          dotnet build OdysseyHubClient -c Release "${version_props[@]}"
          dotnet pack OdysseyHubClient -o nugets "${version_props[@]}"
      - uses: actions/upload-artifact@v6
        with:
          name: dotnet-nuget
          path: odyssey_hub_client_uniffi/dotnet/OdysseyHubClient/nugets/*.nupkg
